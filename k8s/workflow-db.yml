apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: workflow-db
spec:
  serviceName: workflow-db
  replicas: 1
  selector:
    matchLabels:
      app: workflow-db
  template:
    metadata:
      labels:
        app: workflow-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: workflows
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cafetiria-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cafetiria-secret
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "workflows"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "workflows"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: workflow-db-data
  volumeClaimTemplates:
    - metadata:
        name: workflow-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-db
spec:
  selector:
    app: workflow-db
  ports:
    - port: 5432
      targetPort: 5432
