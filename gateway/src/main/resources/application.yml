spring:
  application.name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: order-health
              order: 1
              uri: ${ORDER_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/health/orders
              filters:
                - RewritePath=/health/orders, /api/health

            - id: user-health
              order: 1
              uri: ${USER_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/health/users
              filters:
                - RewritePath=/health/users, /api/health

            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/orders,/orders/**
              filters:
                - RewritePath=/orders(?:/(?<segment>.+))?, /api/orders/$\{segment}

            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/users,/users/**
              filters:
                - RewritePath=/users(?:/(?<segment>.+))?, /api/users/$\{segment}

            - id: workflow-service
              uri: ${WORKFLOW_SERVICE_URL:http://localhost:8091}
              predicates:
                - Path=/workflows/**
              filters:
                - RewritePath=/workflows(?:/(?<segment>.+))?, /api/workflows/$\{segment}

server:
  port: 8081

management:
  endpoint:
    health:
      show-details: always

correlation:
  key: correlationId
  header: X-Correlation-Id