services:
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    platform: linux/arm64
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - cafetiria-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-db:
    container_name: notification-db
    image: postgres:16
    platform: linux/arm64
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: notifications
    ports:
      - "5434:5432"
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    networks:
      - cafetiria-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    container_name: notification-service
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: jdbc:postgresql://notification-db:5432/notifications
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8090:8090"
    networks:
      - cafetiria-network
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-db:
    container_name: order-db
    image: postgres:16
    platform: linux/arm64
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - cafetiria-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db:
    container_name: user-db
    image: postgres:16
    platform: linux/arm64
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - cafetiria-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d users"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    container_name: order-service
    build:
      context: ./order-service
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: jdbc:postgresql://order-db:5432/orders
      USERS_URL: http://user-service:8080/api/users/
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8088:8088"
    networks:
      - cafetiria-network
    depends_on:
      order-db:
        condition: service_healthy
      user-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8088/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  user-service:
    container_name: user-service
    build:
      context: ./user-service
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_URL: jdbc:postgresql://user-db:5432/users
    ports:
      - "8080:8080"
    networks:
      - cafetiria-network
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  gateway:
    container_name: gateway
    build:
      context: ./gateway
      dockerfile: Dockerfile
    platform: linux/arm64
    environment:
      ORDER_SERVICE_URL: http://order-service:8088
      USER_SERVICE_URL: http://user-service:8080
    ports:
      - "8081:8081"
    networks:
      - cafetiria-network
    depends_on:
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy

networks:
  cafetiria-network:
    driver: bridge

volumes:
  order-db-data:
  user-db-data:
  notification-db-data: